<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Budday</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8e8f0 0%, #e8d4f0 50%, #f0e0f8 100%);
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Blob background shapes like the reference images */
        .blob-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(ellipse, #f4dce8 0%, #e8d0f0 40%, transparent 70%);
            border-radius: 60% 40% 50% 50% / 50% 60% 40% 50%;
            z-index: 0;
            animation: blobMorph 15s ease-in-out infinite;
        }

        @keyframes blobMorph {
            0%, 100% { border-radius: 60% 40% 50% 50% / 50% 60% 40% 50%; }
            33% { border-radius: 50% 60% 40% 60% / 60% 40% 50% 50%; }
            66% { border-radius: 40% 50% 60% 40% / 50% 50% 60% 40%; }
        }

        /* Floating hearts */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            font-size: 12px;
            animation: floatHeart linear infinite;
            opacity: 0.6;
        }

        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Main content */
        .scene {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #4a4a6a;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(200, 160, 200, 0.4);
        }

        .subtitle {
            color: #8a7a9a;
            font-size: 1.1rem;
            margin-bottom: 40px;
            text-align: center;
            transition: opacity 0.5s;
        }

        /* Progress dots */
        .progress {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .progress-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #b8a0c8;
            background: transparent;
            transition: background 0.5s, border-color 0.5s, transform 0.3s;
        }

        .progress-dot.filled {
            background: #b8a0c8;
            border-color: #9080a8;
            transform: scale(1.2);
        }

        .progress-label {
            font-size: 0.75rem;
            color: #a090b0;
            margin-top: 4px;
            text-align: center;
        }

        /* Table cat scene */
        .table-scene {
            position: relative;
            width: 600px;
            max-width: 90vw;
            margin: 0 auto;
        }

        .table-scene svg {
            width: 100%;
            height: auto;
        }

        #table-cat {
            transition: transform 0.2s;
        }

        /* Bunting flags */
        .bunting {
            position: relative;
            width: 500px;
            max-width: 85vw;
            margin: 0 auto 20px;
        }

        .bunting-flag {
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
        }

        .bunting-flag.scattered {
            opacity: 0.6;
        }

        .bunting-flag.placed {
            opacity: 1;
            cursor: default;
        }

        .bunting-flag:not(.placed):hover {
            filter: brightness(1.2);
        }

        .bunting-string {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            transition: stroke-dashoffset 2s ease-out;
        }

        .bunting-string.revealed {
            stroke-dashoffset: 0;
        }

        /* Sparkle burst on flag placement */
        @keyframes sparkle {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .sparkle {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffe060 0%, transparent 70%);
            pointer-events: none;
            animation: sparkle 0.5s ease-out forwards;
        }

        /* Stage hint pulse */
        @keyframes hintPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .hint-pulse {
            animation: hintPulse 1.5s ease-in-out infinite;
        }

        /* Message bubble */
        .message-bubble {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: white;
            border-radius: 20px;
            padding: 12px 24px;
            font-size: 1.2rem;
            color: #4a4a6a;
            box-shadow: 0 4px 20px rgba(100, 80, 120, 0.2);
            white-space: nowrap;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .message-bubble.show {
            transform: translateX(-50%) scale(1);
        }

        .message-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 12px solid white;
        }

        /* Fire animation on cake */
        .flame {
            opacity: 0;
            transition: opacity 0.5s;
        }

        .flame.lit {
            opacity: 1;
            animation: flicker 0.3s ease-in-out infinite alternate;
        }

        /* Candle glow hint during stage 3 */
        @keyframes candleGlow {
            0%, 100% { filter: drop-shadow(0 0 0px transparent); }
            50% { filter: drop-shadow(0 0 6px #ffe060); }
        }

        .candle-hint {
            animation: candleGlow 1.5s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes flicker {
            0% { transform: scaleY(1) scaleX(1); }
            50% { transform: scaleY(1.2) scaleX(0.9); }
            100% { transform: scaleY(0.9) scaleX(1.1); }
        }

        /* Floating cat with balloons */
        .floating-cat {
            position: fixed;
            z-index: 4;
            pointer-events: none;
            animation: floatCat linear infinite;
        }

        .floating-cat svg {
            width: 120px;
            height: auto;
        }

        .floating-cat.happy svg .cat-mouth {
            transition: d 0.5s;
        }

        /* Sleeping state */
        .floating-cat.asleep {
            opacity: 0.5;
            filter: grayscale(0.3);
        }

        .floating-cat.asleep svg {
            filter: saturate(0.6);
        }

        .floating-cat .sleep-eyes { display: none; }
        .floating-cat .awake-eyes { display: block; }
        .floating-cat.asleep .sleep-eyes { display: block; }
        .floating-cat.asleep .awake-eyes { display: none; }

        /* Balloons start deflated when cat is asleep */
        .floating-cat.asleep .cat-balloon {
            transform: scale(0.4);
            transform-origin: center bottom;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .floating-cat .cat-balloon {
            transform: scale(1);
            transform-origin: center bottom;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Wake-up stretch animation */
        @keyframes catStretch {
            0% { transform: scaleX(1) scaleY(1); }
            30% { transform: scaleX(1.15) scaleY(0.85); }
            60% { transform: scaleX(0.9) scaleY(1.1); }
            100% { transform: scaleX(1) scaleY(1); }
        }

        .cat-waking {
            animation: catStretch 0.6s ease-out;
        }

        /* Cat speech bubble */
        .cat-speech {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: white;
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 0.8rem;
            color: #4a4a6a;
            white-space: nowrap;
            box-shadow: 0 2px 10px rgba(100, 80, 120, 0.15);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .cat-speech.show {
            transform: translateX(-50%) scale(1);
        }

        .cat-speech::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 7px solid white;
        }

        @keyframes floatCat {
            0% { transform: translateY(0px) rotate(-2deg); }
            25% { transform: translateY(-15px) rotate(1deg); }
            50% { transform: translateY(-5px) rotate(-1deg); }
            75% { transform: translateY(-20px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(-2deg); }
        }

        /* Cloud decorations */
        .cloud {
            position: fixed;
            z-index: 1;
            opacity: 0.5;
        }

        /* Confetti pieces */
        .confetti-piece {
            position: fixed;
            z-index: 20;
            pointer-events: none;
            will-change: transform, opacity;
        }

        .confetti-ribbon {
            position: fixed;
            z-index: 20;
            pointer-events: none;
            border-radius: 2px;
        }

        .confetti-circle {
            position: fixed;
            z-index: 20;
            pointer-events: none;
            border-radius: 50%;
        }

        .confetti-squiggle {
            position: fixed;
            z-index: 20;
            pointer-events: none;
            border: 2px solid;
            border-radius: 50%;
            background: transparent !important;
        }

        /* Three.js canvas */
        #balloon-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="blob-bg"></div>
    <div class="hearts-container" id="hearts"></div>

    <div class="scene">
        <div class="progress">
            <div>
                <div class="progress-dot" id="dot-1"></div>
                <div class="progress-label">Decorate</div>
            </div>
            <div>
                <div class="progress-dot" id="dot-2"></div>
                <div class="progress-label">Wake up</div>
            </div>
            <div>
                <div class="progress-dot" id="dot-3"></div>
                <div class="progress-label">Light up</div>
            </div>
        </div>
        <h1 id="title">Hmm... the party isn't ready yet</h1>
        <p class="subtitle" id="subtitle">Tap the scattered flags to hang them up!</p>

        <!-- Bunting flags -->
        <div class="bunting" id="bunting-area">
            <svg viewBox="0 0 500 130" xmlns="http://www.w3.org/2000/svg" id="bunting-svg">
                <!-- String (hidden initially, reveals as flags are placed) -->
                <path class="bunting-string" id="bunting-string" d="M10,15 Q250,0 490,15" stroke="#3a3a5a" stroke-width="2" fill="none"/>
                <!-- Flags: start scattered at bottom, animate to string position on click -->
                <polygon class="bunting-flag scattered hint-pulse" id="flag-1" data-target="80,13 100,58 60,58"    points="30,80 55,120 5,120"  fill="#3a4a8a"/>
                <polygon class="bunting-flag scattered hint-pulse" id="flag-2" data-target="130,16 150,61 110,61"  points="455,85 480,125 430,125" fill="#f4b8c8" style="animation-delay:0.2s"/>
                <polygon class="bunting-flag scattered hint-pulse" id="flag-3" data-target="180,13 200,58 160,58"  points="110,83 135,123 85,123" fill="#d06040" style="animation-delay:0.4s"/>
                <polygon class="bunting-flag scattered hint-pulse" id="flag-4" data-target="230,10 250,55 210,55"  points="340,88 365,128 315,128" fill="#b8e0f0" style="animation-delay:0.1s"/>
                <polygon class="bunting-flag scattered hint-pulse" id="flag-5" data-target="280,10 300,55 260,55"  points="190,85 215,125 165,125" fill="#3a4a8a" style="animation-delay:0.3s"/>
                <polygon class="bunting-flag scattered hint-pulse" id="flag-6" data-target="330,13 350,58 310,58"  points="270,82 295,122 245,122" fill="#f4b8c8" style="animation-delay:0.5s"/>
                <polygon class="bunting-flag scattered hint-pulse" id="flag-7" data-target="380,16 400,61 360,61"  points="395,80 420,120 370,120" fill="#d06040" style="animation-delay:0.15s"/>
                <polygon class="bunting-flag scattered hint-pulse" id="flag-8" data-target="430,13 450,58 410,58"  points="150,88 175,128 125,128" fill="#b8e0f0" style="animation-delay:0.35s"/>
            </svg>
        </div>

        <!-- Main cat on table scene -->
        <div class="table-scene">
            <div class="message-bubble" id="message">🎉 Happy Birthday, Nishtha! 🎂</div>
            <svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" id="main-scene">
                <!-- Pink blob background -->
                <ellipse cx="300" cy="180" rx="260" ry="180" fill="#f8dce8" opacity="0.6"/>

                <!-- Wall frames -->
                <rect x="60" y="40" width="80" height="60" fill="none" stroke="#3a3a5a" stroke-width="2" rx="3"/>
                <rect x="70" y="120" width="60" height="45" fill="none" stroke="#3a3a5a" stroke-width="2" rx="3"/>
                <rect x="430" y="30" width="100" height="55" fill="none" stroke="#3a3a5a" stroke-width="2" rx="3"/>
                <rect x="440" y="100" width="90" height="50" fill="none" stroke="#3a3a5a" stroke-width="2" rx="3"/>

                <!-- Table -->
                <ellipse cx="300" cy="350" rx="160" ry="20" fill="#a8d8d8" opacity="0.4"/>
                <rect x="130" y="240" width="340" height="12" rx="3" fill="#2a2a3a"/>
                <path d="M180,252 L170,340" stroke="#2a2a3a" stroke-width="8" stroke-linecap="round"/>
                <path d="M420,252 L430,340" stroke="#2a2a3a" stroke-width="8" stroke-linecap="round"/>
                <path d="M300,252 L300,340" stroke="#2a2a3a" stroke-width="6" stroke-linecap="round"/>

                <!-- Cake -->
                <g id="cake">
                    <!-- Bottom tier -->
                    <rect x="185" y="195" width="100" height="45" rx="5" fill="#d06040"/>
                    <!-- Wavy decoration -->
                    <path d="M185,210 Q197,220 210,210 Q222,200 235,210 Q247,220 260,210 Q272,200 285,210" stroke="#f0e0d0" stroke-width="3" fill="none"/>
                    <!-- Top tier -->
                    <rect x="195" y="165" width="80" height="35" rx="5" fill="#f4b8c8"/>

                    <!-- Candles -->
                    <rect x="218" y="140" width="4" height="25" fill="#6080c0" rx="1"/>
                    <rect x="233" y="135" width="4" height="30" fill="#e8c040" rx="1"/>
                    <rect x="248" y="140" width="4" height="25" fill="#6080c0" rx="1"/>

                    <!-- Individual flames (hidden until tapped in stage 3) -->
                    <g class="flame" id="flame-1">
                        <ellipse cx="220" cy="132" rx="5" ry="10" fill="#ff6030" opacity="0.9"/>
                        <ellipse cx="220" cy="130" rx="3" ry="7" fill="#ffa040" opacity="0.9"/>
                        <ellipse cx="220" cy="128" rx="2" ry="4" fill="#ffe060"/>
                    </g>
                    <g class="flame" id="flame-2">
                        <ellipse cx="235" cy="127" rx="6" ry="12" fill="#ff6030" opacity="0.9"/>
                        <ellipse cx="235" cy="125" rx="4" ry="8" fill="#ffa040" opacity="0.9"/>
                        <ellipse cx="235" cy="123" rx="2" ry="5" fill="#ffe060"/>
                    </g>
                    <g class="flame" id="flame-3">
                        <ellipse cx="250" cy="132" rx="5" ry="10" fill="#ff6030" opacity="0.9"/>
                        <ellipse cx="250" cy="130" rx="3" ry="7" fill="#ffa040" opacity="0.9"/>
                        <ellipse cx="250" cy="128" rx="2" ry="4" fill="#ffe060"/>
                    </g>

                    <!-- Clickable candle areas (invisible, on top) -->
                    <rect class="candle-click-area" data-flame="flame-1" x="210" y="125" width="20" height="40" fill="transparent" style="pointer-events:none; cursor:pointer;"/>
                    <rect class="candle-click-area" data-flame="flame-2" x="225" y="120" width="20" height="45" fill="transparent" style="pointer-events:none; cursor:pointer;"/>
                    <rect class="candle-click-area" data-flame="flame-3" x="240" y="125" width="20" height="40" fill="transparent" style="pointer-events:none; cursor:pointer;"/>
                </g>

                <!-- Cat on table -->
                <g id="table-cat">
                    <!-- Body -->
                    <ellipse cx="380" cy="210" rx="65" ry="45" fill="#8a8a9a"/>
                    <!-- Dark patches -->
                    <ellipse cx="395" cy="200" rx="40" ry="30" fill="#5a5a6a"/>
                    <!-- Tail -->
                    <path d="M440,215 Q480,200 470,240 Q465,260 450,250" stroke="#5a5a6a" stroke-width="14" fill="none" stroke-linecap="round"/>
                    <!-- Head -->
                    <circle cx="345" cy="180" r="30" fill="#8a8a9a"/>
                    <!-- Ears -->
                    <polygon points="322,160 330,140 340,162" fill="#8a8a9a"/>
                    <polygon points="326,158 332,144 338,160" fill="#f4b8c8"/>
                    <polygon points="355,155 365,135 372,158" fill="#5a5a6a"/>
                    <polygon points="358,154 365,140 370,156" fill="#f4b8c8"/>
                    <!-- Face -->
                    <circle cx="337" cy="175" r="5" fill="white"/>
                    <circle cx="355" cy="175" r="5" fill="white"/>
                    <circle cx="338" cy="176" r="3" fill="#2a2a3a"/>
                    <circle cx="354" cy="176" r="3" fill="#2a2a3a"/>
                    <!-- Nose -->
                    <polygon points="346,182 343,186 349,186" fill="#f4a0a0"/>
                    <!-- Mouth (changes on click) -->
                    <path id="cat-mouth" d="M343,188 Q346,191 349,188" stroke="#5a5a6a" stroke-width="1.5" fill="none"/>
                    <!-- Whiskers -->
                    <line x1="330" y1="183" x2="310" y2="180" stroke="#5a5a6a" stroke-width="1"/>
                    <line x1="330" y1="186" x2="308" y2="188" stroke="#5a5a6a" stroke-width="1"/>
                    <line x1="362" y1="183" x2="382" y2="180" stroke="#5a5a6a" stroke-width="1"/>
                    <line x1="362" y1="186" x2="384" y2="188" stroke="#5a5a6a" stroke-width="1"/>
                    <!-- Party hat -->
                    <polygon points="345,155 335,140 355,140" fill="white" stroke="#b8d8f0" stroke-width="1"/>
                    <line x1="338" y1="150" x2="338" y2="140" stroke="#f4b8c8" stroke-width="1.5"/>
                    <line x1="345" y1="152" x2="345" y2="140" stroke="#b8d8f0" stroke-width="1.5"/>
                    <line x1="352" y1="150" x2="352" y2="140" stroke="#f4b8c8" stroke-width="1.5"/>
                    <circle cx="345" cy="138" r="3" fill="#b8d8f0"/>
                    <!-- Bow -->
                    <path d="M335,195 Q330,190 325,195 Q330,200 335,195" fill="#f4b8c8"/>
                    <path d="M335,195 Q340,190 345,195 Q340,200 335,195" fill="#f4b8c8"/>
                    <circle cx="335" cy="195" r="2" fill="#d08090"/>
                    <!-- Front paw reaching toward cake -->
                    <ellipse cx="315" cy="235" rx="12" ry="8" fill="#8a8a9a"/>
                </g>
            </svg>
        </div>

        <!-- Floating cats with balloons (start asleep) -->
        <div class="floating-cat asleep" id="float-cat-1" data-speech="meow! 🎉" style="left: 5%; top: 15%;">
            <div class="cat-speech" id="speech-1"></div>
            <svg viewBox="0 0 150 220" xmlns="http://www.w3.org/2000/svg">
                <!-- Balloons -->
                <g class="cat-balloon">
                    <ellipse cx="55" cy="40" rx="25" ry="35" fill="#c0a0e0" opacity="0.8"/>
                    <ellipse cx="90" cy="50" rx="20" ry="30" fill="#a0c0e0" opacity="0.8"/>
                    <ellipse cx="70" cy="55" rx="22" ry="32" fill="#f0b8c8" opacity="0.8"/>
                </g>
                <line x1="55" y1="75" x2="75" y2="130" stroke="#3a3a5a" stroke-width="1"/>
                <line x1="90" y1="80" x2="75" y2="130" stroke="#3a3a5a" stroke-width="1"/>
                <line x1="70" y1="87" x2="75" y2="130" stroke="#3a3a5a" stroke-width="1"/>
                <ellipse cx="75" cy="160" rx="25" ry="20" fill="#f0c8b0"/>
                <ellipse cx="58" cy="178" rx="6" ry="10" fill="#f0c8b0"/>
                <ellipse cx="92" cy="178" rx="6" ry="10" fill="#f0c8b0"/>
                <path d="M98,155 Q120,145 115,170" stroke="#f0c8b0" stroke-width="6" fill="none" stroke-linecap="round"/>
                <circle cx="75" cy="138" r="18" fill="#f0c8b0"/>
                <polygon points="62,125 58,110 70,122" fill="#f0c8b0"/>
                <polygon points="88,125 92,110 80,122" fill="#f0c8b0"/>
                <polygon points="64,124 60,114 69,122" fill="#f4b8c8"/>
                <polygon points="86,124 90,114 81,122" fill="#f4b8c8"/>
                <!-- Sleep eyes -->
                <g class="sleep-eyes">
                    <line x1="64" y1="136" x2="72" y2="136" stroke="#2a2a3a" stroke-width="2" stroke-linecap="round"/>
                    <line x1="78" y1="136" x2="86" y2="136" stroke="#2a2a3a" stroke-width="2" stroke-linecap="round"/>
                </g>
                <!-- Awake eyes -->
                <g class="awake-eyes">
                    <circle cx="68" cy="136" r="4" fill="#2a2a3a"/>
                    <circle cx="82" cy="136" r="4" fill="#2a2a3a"/>
                    <circle cx="69" cy="135" r="1.5" fill="white"/>
                    <circle cx="83" cy="135" r="1.5" fill="white"/>
                </g>
                <ellipse cx="75" cy="141" rx="2" ry="1.5" fill="#3a3a5a"/>
                <path class="cat-smile" d="M72,144 Q75,146 78,144" stroke="#3a3a5a" stroke-width="1" fill="none"/>
                <line x1="65" y1="140" x2="50" y2="138" stroke="#3a3a5a" stroke-width="0.8"/>
                <line x1="65" y1="143" x2="48" y2="145" stroke="#3a3a5a" stroke-width="0.8"/>
                <line x1="85" y1="140" x2="100" y2="138" stroke="#3a3a5a" stroke-width="0.8"/>
                <line x1="85" y1="143" x2="102" y2="145" stroke="#3a3a5a" stroke-width="0.8"/>
                <polygon points="75,122 68,108 82,108" fill="#6080c0"/>
                <circle cx="75" cy="107" r="2" fill="#ffe060"/>
                <path d="M75,155 Q70,150 65,155 Q70,160 75,155" fill="#6080c0"/>
                <path d="M75,155 Q80,150 85,155 Q80,160 75,155" fill="#6080c0"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Three.js floating balloons
        (function() {
            const canvas = document.getElementById('balloon-canvas');
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 15;

            // Soft lighting
            const ambientLight = new THREE.AmbientLight(0xf0e0f0, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            const balloonColors = [0xc0a0e0, 0xa0c0e0, 0xf0b8c8, 0xd898d0, 0x90b8e0, 0xe8b0d0, 0xf4b8c8, 0xb8d0f0];
            const balloons = [];

            for (let i = 0; i < 18; i++) {
                const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];

                // Balloon shape: elongated sphere
                const geo = new THREE.SphereGeometry(0.5, 16, 16);
                geo.scale(1, 1.3, 1);
                const mat = new THREE.MeshPhongMaterial({
                    color,
                    transparent: true,
                    opacity: 0.15,
                    shininess: 80,
                    specular: 0xffffff,
                });
                const balloon = new THREE.Mesh(geo, mat);

                // Knot at bottom
                const knotGeo = new THREE.ConeGeometry(0.08, 0.15, 8);
                const knotMat = new THREE.MeshPhongMaterial({ color });
                const knot = new THREE.Mesh(knotGeo, knotMat);
                knot.position.y = -0.68;
                knot.rotation.x = Math.PI;
                balloon.add(knot);

                // String
                const stringGeo = new THREE.CylinderGeometry(0.01, 0.01, 1.5, 4);
                const stringMat = new THREE.MeshBasicMaterial({ color: 0x3a3a5a });
                const string = new THREE.Mesh(stringGeo, stringMat);
                string.position.y = -1.43;
                balloon.add(string);

                // Random position
                balloon.position.set(
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 14,
                    (Math.random() - 0.5) * 8
                );

                balloon.userData = {
                    baseY: balloon.position.y,
                    baseX: balloon.position.x,
                    speedY: 0.3 + Math.random() * 0.5,
                    speedX: 0.1 + Math.random() * 0.3,
                    phaseY: Math.random() * Math.PI * 2,
                    phaseX: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.5,
                };

                scene.add(balloon);
                balloons.push(balloon);
            }

            function animate(time) {
                requestAnimationFrame(animate);
                const t = time * 0.001;

                balloons.forEach(b => {
                    const d = b.userData;
                    b.position.y = d.baseY + Math.sin(t * d.speedY + d.phaseY) * 1.5;
                    b.position.x = d.baseX + Math.sin(t * d.speedX + d.phaseX) * 0.8;
                    b.rotation.z = Math.sin(t * d.rotSpeed) * 0.1;
                });

                renderer.render(scene, camera);
            }
            animate(0);

            // Expose balloons for stage transitions
            window._threeBalloons = balloons;

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>

    <script>
        // Hearts (delayed until stage 2 completes)
        const heartsContainer = document.getElementById('hearts');
        const heartColors = ['#4a4a8a', '#d4a0c0', '#a080c0', '#e0b0d0', '#6060a0'];

        function startHearts() {
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = '♥';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.color = heartColors[Math.floor(Math.random() * heartColors.length)];
                heart.style.fontSize = (8 + Math.random() * 14) + 'px';
                heart.style.animationDuration = (8 + Math.random() * 12) + 's';
                heart.style.animationDelay = Math.random() * 5 + 's';
                heartsContainer.appendChild(heart);
            }
        }

        // Colorize Three.js balloons (fade from dim to full)
        function colorizeBalloons() {
            if (!window._threeBalloons) return;
            let progress = 0;
            function fadeIn() {
                progress += 0.02;
                window._threeBalloons.forEach(b => {
                    b.material.opacity = 0.15 + progress * 0.55;
                });
                if (progress < 1) requestAnimationFrame(fadeIn);
            }
            fadeIn();
        }

        // Google Meet-style confetti system
        const confettiColors = ['#4285F4', '#EA4335', '#FBBC04', '#34A853', '#FF6D01', '#46BDC6', '#7B1FA2', '#E91E63', '#f4b8c8', '#c0a0e0'];

        function launchConfetti() {
            const W = window.innerWidth;
            const H = window.innerHeight;
            const totalPieces = 150;
            const duration = 5000; // confetti falls for 5 seconds

            // Spawn pieces in staggered waves from the top
            for (let i = 0; i < totalPieces; i++) {
                const delay = Math.random() * 2000; // stagger over 2 seconds
                setTimeout(() => spawnPiece(W, H, duration), delay);
            }
        }

        function spawnPiece(W, H, duration) {
            const color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
            const shapeType = Math.random();
            const el = document.createElement('div');

            if (shapeType < 0.4) {
                // Thin ribbon/rectangle - the classic confetti shape
                el.className = 'confetti-ribbon';
                const w = 3 + Math.random() * 5;
                const h = 10 + Math.random() * 18;
                el.style.width = w + 'px';
                el.style.height = h + 'px';
                el.style.backgroundColor = color;
            } else if (shapeType < 0.65) {
                // Small circle/dot
                el.className = 'confetti-circle';
                const s = 5 + Math.random() * 7;
                el.style.width = s + 'px';
                el.style.height = s + 'px';
                el.style.backgroundColor = color;
            } else if (shapeType < 0.85) {
                // Squiggly / hollow arc
                el.className = 'confetti-squiggle';
                const s = 8 + Math.random() * 10;
                el.style.width = s + 'px';
                el.style.height = s * (0.5 + Math.random() * 0.5) + 'px';
                el.style.borderColor = color;
                el.style.borderWidth = '2px';
            } else {
                // Wide flat piece
                el.className = 'confetti-ribbon';
                const w = 8 + Math.random() * 12;
                const h = 4 + Math.random() * 5;
                el.style.width = w + 'px';
                el.style.height = h + 'px';
                el.style.backgroundColor = color;
                el.style.borderRadius = '1px';
            }

            // Start above the screen, spread across the full width
            let px = Math.random() * W;
            let py = -20 - Math.random() * 80;
            el.style.left = px + 'px';
            el.style.top = py + 'px';
            document.body.appendChild(el);

            // Gentle physics - slow tumbling fall with swaying
            const fallSpeed = 1.2 + Math.random() * 2; // slow fall
            const swayAmount = 1 + Math.random() * 2.5; // horizontal sway
            const swaySpeed = 0.02 + Math.random() * 0.03; // sway frequency
            let rotX = Math.random() * 360;
            let rotY = Math.random() * 360;
            let rotZ = Math.random() * 360;
            const rotXSpeed = 1 + Math.random() * 3;
            const rotYSpeed = 0.5 + Math.random() * 2;
            const rotZSpeed = 0.5 + Math.random() * 1.5;
            let t = Math.random() * Math.PI * 2; // phase offset for sway
            let opacity = 1;
            const startTime = performance.now();

            function update(now) {
                const elapsed = now - startTime;

                // Gentle downward drift
                py += fallSpeed;
                // Sinusoidal sway left-right
                t += swaySpeed;
                px += Math.sin(t) * swayAmount;

                // 3D tumble rotation for that fluttering paper look
                rotX += rotXSpeed;
                rotY += rotYSpeed;
                rotZ += rotZSpeed;

                // Fade out toward the end
                if (elapsed > duration - 1500) {
                    opacity -= 0.015;
                }

                // Remove when off screen or faded
                if (py > H + 50 || opacity <= 0) {
                    el.remove();
                    return;
                }

                el.style.left = px + 'px';
                el.style.top = py + 'px';
                el.style.transform = 'rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg) rotateZ(' + rotZ + 'deg)';
                el.style.opacity = Math.max(0, opacity);
                requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        // Game state management
        const state = {
            stage: 1, // 1=bunting, 2=cats, 3=candles, 4=finale
            flagsPlaced: 0,
            catsAwake: 0,
            candlesLit: 0,
        };

        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const messageBubble = document.getElementById('message');
        // candleGlow removed — candles handled individually in stage 3
        const catMouth = document.getElementById('cat-mouth');

        function advanceStage(nextStage) {
            state.stage = nextStage;
            if (nextStage === 2) {
                document.getElementById('dot-1').classList.add('filled');
                title.textContent = 'Great! Now wake up the sleepy cats';
                subtitle.textContent = 'Tap each floating cat to wake them up';
                initStage2();
            } else if (nextStage === 3) {
                document.getElementById('dot-2').classList.add('filled');
                title.textContent = 'Almost there! Light the candles';
                subtitle.textContent = 'Tap each candle on the cake';
                initStage3();
            } else if (nextStage === 4) {
                document.getElementById('dot-3').classList.add('filled');
                title.textContent = 'Happy Birthday!';
                subtitle.style.opacity = '0';
                triggerFinale();
            }
        }

        function triggerFinale() {
            // Launch confetti
            launchConfetti();

            // Show message bubble
            messageBubble.classList.add('show');

            // Make the main cat smile big
            catMouth.setAttribute('d', 'M340,188 Q346,196 352,188');
            catMouth.setAttribute('stroke-width', '2');

            // Make all floating cats happy (bigger smiles)
            document.querySelectorAll('.cat-smile').forEach(mouth => {
                const d = mouth.getAttribute('d');
                mouth.setAttribute('d', d.replace(/Q(\d+),(\d+)/, (m, x, y) => `Q${x},${parseInt(y) + 4}`));
                mouth.setAttribute('stroke-width', '1.5');
            });

            // Add bouncy animation to floating cats
            document.querySelectorAll('.floating-cat').forEach(cat => {
                cat.style.animationDuration = '3s';
            });

            // Spawn extra hearts burst
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.textContent = Math.random() > 0.5 ? '♥' : '✦';
                    heart.style.left = (30 + Math.random() * 40) + '%';
                    heart.style.top = (40 + Math.random() * 20) + '%';
                    heart.style.color = heartColors[Math.floor(Math.random() * heartColors.length)];
                    heart.style.fontSize = (12 + Math.random() * 18) + 'px';
                    heart.style.animationDuration = (4 + Math.random() * 6) + 's';
                    heart.style.animationDelay = '0s';
                    heartsContainer.appendChild(heart);
                }, i * 100);
            }
        }

        // === STAGE 1: Bunting flags ===
        document.querySelectorAll('.bunting-flag').forEach(flag => {
            flag.addEventListener('click', () => {
                if (state.stage !== 1 || flag.classList.contains('placed')) return;

                const target = flag.getAttribute('data-target');
                flag.setAttribute('points', target);
                flag.classList.remove('scattered', 'hint-pulse');
                flag.classList.add('placed');

                state.flagsPlaced++;

                // Reveal string progressively
                const string = document.getElementById('bunting-string');
                const progress = state.flagsPlaced / 8;
                string.style.strokeDashoffset = 1000 * (1 - progress);

                // Update subtitle with count
                subtitle.textContent = `Flags hung: ${state.flagsPlaced}/8`;

                if (state.flagsPlaced === 8) {
                    string.classList.add('revealed');
                    setTimeout(() => advanceStage(2), 800);
                }
            });
        });

        // === STAGE 2: Wake the cats ===
        function initStage2() {
            document.querySelectorAll('.floating-cat').forEach(cat => {
                cat.style.pointerEvents = 'auto';
                cat.style.cursor = 'pointer';
                cat.classList.add('hint-pulse');
            });
        }

        document.querySelectorAll('.floating-cat').forEach((cat, idx) => {
            cat.addEventListener('click', () => {
                if (state.stage !== 2 || !cat.classList.contains('asleep')) return;

                // Wake up!
                cat.classList.remove('asleep', 'hint-pulse');
                cat.querySelector('svg').classList.add('cat-waking');

                // Show speech bubble
                const speech = cat.querySelector('.cat-speech');
                speech.textContent = cat.getAttribute('data-speech');
                speech.classList.add('show');
                setTimeout(() => speech.classList.remove('show'), 2500);

                state.catsAwake++;
                subtitle.textContent = `Cats awake: ${state.catsAwake}/4`;

                if (state.catsAwake === 4) {
                    // Start hearts and colorize Three.js balloons
                    startHearts();
                    colorizeBalloons();
                    setTimeout(() => advanceStage(3), 1000);
                }
            });
        });

        // === STAGE 3: Light the candles ===
        function initStage3() {
            // Enable candle click areas
            document.querySelectorAll('.candle-click-area').forEach(area => {
                area.style.pointerEvents = 'auto';
            });
            // Add glow hint to candle rects (the candle sticks themselves)
            document.querySelectorAll('#cake rect[rx="1"]').forEach(r => {
                r.classList.add('candle-hint');
            });
        }

        document.querySelectorAll('.candle-click-area').forEach(area => {
            area.addEventListener('click', () => {
                if (state.stage !== 3) return;
                const flameId = area.getAttribute('data-flame');
                const flame = document.getElementById(flameId);
                if (flame.classList.contains('lit')) return;

                flame.classList.add('lit');
                area.style.pointerEvents = 'none';
                state.candlesLit++;

                subtitle.textContent = `Candles lit: ${state.candlesLit}/3`;

                if (state.candlesLit === 3) {
                    // Remove candle hints
                    document.querySelectorAll('.candle-hint').forEach(r => r.classList.remove('candle-hint'));
                    setTimeout(() => advanceStage(4), 800);
                }
            });
        });
    </script>
