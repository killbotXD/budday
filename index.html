<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Budday</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8e8f0 0%, #e8d4f0 50%, #f0e0f8 100%);
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Blob background shapes like the reference images */
        .blob-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(ellipse, #f4dce8 0%, #e8d0f0 40%, transparent 70%);
            border-radius: 60% 40% 50% 50% / 50% 60% 40% 50%;
            z-index: 0;
            animation: blobMorph 15s ease-in-out infinite;
        }

        @keyframes blobMorph {
            0%, 100% { border-radius: 60% 40% 50% 50% / 50% 60% 40% 50%; }
            33% { border-radius: 50% 60% 40% 60% / 60% 40% 50% 50%; }
            66% { border-radius: 40% 50% 60% 40% / 50% 50% 60% 40%; }
        }

        /* Floating hearts */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            font-size: 12px;
            animation: floatHeart linear infinite;
            opacity: 0.6;
        }

        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Main content */
        .scene {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #4a4a6a;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(200, 160, 200, 0.4);
        }

        .subtitle {
            color: #8a7a9a;
            font-size: 1.1rem;
            margin-bottom: 40px;
            text-align: center;
        }

        /* Table cat scene */
        .table-scene {
            position: relative;
            width: 600px;
            max-width: 90vw;
            margin: 0 auto;
        }

        .table-scene svg {
            width: 100%;
            height: auto;
        }

        #table-cat {
            cursor: pointer;
            transition: transform 0.2s;
        }

        #table-cat:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        /* Bunting flags */
        .bunting {
            position: relative;
            width: 500px;
            max-width: 85vw;
            margin: 0 auto 20px;
        }

        /* Message bubble */
        .message-bubble {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: white;
            border-radius: 20px;
            padding: 12px 24px;
            font-size: 1.2rem;
            color: #4a4a6a;
            box-shadow: 0 4px 20px rgba(100, 80, 120, 0.2);
            white-space: nowrap;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .message-bubble.show {
            transform: translateX(-50%) scale(1);
        }

        .message-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 12px solid white;
        }

        /* Fire animation on cake */
        .flame {
            opacity: 0;
            transition: opacity 0.5s;
        }

        .flame.lit {
            opacity: 1;
            animation: flicker 0.3s ease-in-out infinite alternate;
        }

        @keyframes flicker {
            0% { transform: scaleY(1) scaleX(1); }
            50% { transform: scaleY(1.2) scaleX(0.9); }
            100% { transform: scaleY(0.9) scaleX(1.1); }
        }

        /* Floating cat with balloons */
        .floating-cat {
            position: fixed;
            z-index: 4;
            pointer-events: none;
            animation: floatCat linear infinite;
        }

        .floating-cat svg {
            width: 120px;
            height: auto;
        }

        .floating-cat.happy svg .cat-mouth {
            transition: d 0.5s;
        }

        @keyframes floatCat {
            0% { transform: translateY(0px) rotate(-2deg); }
            25% { transform: translateY(-15px) rotate(1deg); }
            50% { transform: translateY(-5px) rotate(-1deg); }
            75% { transform: translateY(-20px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(-2deg); }
        }

        /* Cloud decorations */
        .cloud {
            position: fixed;
            z-index: 1;
            opacity: 0.5;
        }

        /* Confetti canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
        }

        /* Three.js canvas */
        #balloon-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }
    </style>
</head>

                <line x1="60" y1="76" x2="75" y2="130" stroke="#3a3a5a" stroke-width="1"/>
                <line x1="90" y1="68" x2="75" y2="130" stroke="#3a3a5a" stroke-width="1"/>
                <!-- Cat body -->
                <ellipse cx="75" cy="160" rx="20" ry="16" fill="#b0b0c0"/>
                <!-- Dark stripe -->
                <ellipse cx="75" cy="158" rx="10" ry="12" fill="#8a8a9a"/>

                <ellipse cx="60" cy="174" rx="5" ry="8" fill="#b0b0c0"/>

                <!-- Tail -->
                <path d="M93,155 Q112,145 106,168" stroke="#8a8a9a" stroke-width="5" fill="none" stroke-linecap="round"/>
                <!-- Head -->
                <circle cx="75" cy="142" r="15" fill="#b0b0c0"/>
                <!-- Ears -->
                <polygon points="64,130 60,118 72,128" fill="#b0b0c0"/>
                <polygon points="86,130 90,118 78,128" fill="#b0b0c0"/>
                <polygon points="65,130 62,121 71,128" fill="#f4b8c8"/>
                <polygon points="85,130 88,121 79,128" fill="#f4b8c8"/>
                <!-- Eyes -->
                <circle cx="69" cy="140" r="3" fill="#2a2a3a"/>

                <circle cx="70" cy="139" r="1" fill="white"/>
                <circle cx="82" cy="139" r="1" fill="white"/>

                <ellipse cx="75" cy="144" rx="2" ry="1.5" fill="#f4a0a0"/>

    </div>

    <canvas id="confetti-canvas"></canvas>
    <canvas id="balloon-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Three.js floating balloons
        (function() {
            const canvas = document.getElementById('balloon-canvas');
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 15;

            // Soft lighting
            const ambientLight = new THREE.AmbientLight(0xf0e0f0, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            const balloonColors = [0xc0a0e0, 0xa0c0e0, 0xf0b8c8, 0xd898d0, 0x90b8e0, 0xe8b0d0, 0xf4b8c8, 0xb8d0f0];
            const balloons = [];

            for (let i = 0; i < 18; i++) {
                const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];

                // Balloon shape: elongated sphere
                const geo = new THREE.SphereGeometry(0.5, 16, 16);
                geo.scale(1, 1.3, 1);
                const mat = new THREE.MeshPhongMaterial({
                    color,
                    transparent: true,
                    opacity: 0.7,
                    shininess: 80,
                    specular: 0xffffff,
                });
                const balloon = new THREE.Mesh(geo, mat);

                // Knot at bottom
                const knotGeo = new THREE.ConeGeometry(0.08, 0.15, 8);
                const knotMat = new THREE.MeshPhongMaterial({ color });
                const knot = new THREE.Mesh(knotGeo, knotMat);
                knot.position.y = -0.68;
                knot.rotation.x = Math.PI;
                balloon.add(knot);

                // String
                const stringGeo = new THREE.CylinderGeometry(0.01, 0.01, 1.5, 4);
                const stringMat = new THREE.MeshBasicMaterial({ color: 0x3a3a5a });
                const string = new THREE.Mesh(stringGeo, stringMat);
                string.position.y = -1.43;
                balloon.add(string);

                // Random position
                balloon.position.set(
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 14,
                    (Math.random() - 0.5) * 8
                );

                balloon.userData = {
                    baseY: balloon.position.y,
                    baseX: balloon.position.x,
                    speedY: 0.3 + Math.random() * 0.5,
                    speedX: 0.1 + Math.random() * 0.3,
                    phaseY: Math.random() * Math.PI * 2,
                    phaseX: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.5,
                };

                scene.add(balloon);
                balloons.push(balloon);
            }

            function animate(time) {
                requestAnimationFrame(animate);
                const t = time * 0.001;

                balloons.forEach(b => {
                    const d = b.userData;
                    b.position.y = d.baseY + Math.sin(t * d.speedY + d.phaseY) * 1.5;
                    b.position.x = d.baseX + Math.sin(t * d.speedX + d.phaseX) * 0.8;
                    b.rotation.z = Math.sin(t * d.rotSpeed) * 0.1;
                });

                renderer.render(scene, camera);
            }
            animate(0);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>

    <script>
        // Generate floating hearts
        const heartsContainer = document.getElementById('hearts');
        const heartColors = ['#4a4a8a', '#d4a0c0', '#a080c0', '#e0b0d0', '#6060a0'];
        for (let i = 0; i < 25; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = '♥';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.color = heartColors[Math.floor(Math.random() * heartColors.length)];
            heart.style.fontSize = (8 + Math.random() * 14) + 'px';
            heart.style.animationDuration = (8 + Math.random() * 12) + 's';
            heart.style.animationDelay = Math.random() * 10 + 's';
            heartsContainer.appendChild(heart);
        }

        // Confetti system
        const confettiCanvas = document.getElementById('confetti-canvas');
        const ctx = confettiCanvas.getContext('2d');
        let confettiPieces = [];
        let confettiActive = false;

        function resizeConfetti() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        }
        resizeConfetti();
        window.addEventListener('resize', resizeConfetti);

        const confettiColors = ['#4a4a8a', '#f4b8c8', '#d898d0', '#a0c0e0', '#d06040', '#ffe060', '#c0a0e0', '#90b8e0', '#e8b0d0', '#ff6030'];
        const confettiShapes = ['rect', 'circle', 'triangle', 'streamer'];

        function launchConfetti() {
            if (confettiActive) return;
            confettiActive = true;

            // Corners: top-left, top-right, bottom-left, bottom-right
            const corners = [
                { x: 0, y: 0, angleMin: 0.2, angleMax: 1.2 },
                { x: confettiCanvas.width, y: 0, angleMin: 1.9, angleMax: 2.9 },
                { x: 0, y: confettiCanvas.height, angleMin: -1.2, angleMax: -0.2 },
                { x: confettiCanvas.width, y: confettiCanvas.height, angleMin: -2.9, angleMax: -1.9 },
            ];

            // Launch multiple waves
            for (let wave = 0; wave < 3; wave++) {
                setTimeout(() => {
                    corners.forEach(corner => {
                        for (let i = 0; i < 40; i++) {
                            const angle = corner.angleMin + Math.random() * (corner.angleMax - corner.angleMin);
                            const speed = 8 + Math.random() * 14;
                            confettiPieces.push({
                                x: corner.x + (Math.random() - 0.5) * 30,
                                y: corner.y + (Math.random() - 0.5) * 30,
                                vx: Math.cos(angle) * speed,
                                vy: Math.sin(angle) * speed,
                                color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
                                shape: confettiShapes[Math.floor(Math.random() * confettiShapes.length)],
                                size: 4 + Math.random() * 8,
                                rotation: Math.random() * Math.PI * 2,
                                rotSpeed: (Math.random() - 0.5) * 0.3,
                                gravity: 0.12 + Math.random() * 0.08,
                                drag: 0.98 + Math.random() * 0.015,
                                opacity: 1,
                                life: 1,
                            });
                        }
                    });
                }, wave * 600);
            }

            animateConfetti();
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

            confettiPieces.forEach(p => {
                p.vy += p.gravity;
                p.vx *= p.drag;
                p.vy *= p.drag;
                p.x += p.vx;
                p.y += p.vy;
                p.rotation += p.rotSpeed;

                // Fade out when off screen or after a while
                if (p.y > confettiCanvas.height + 50 || p.x < -50 || p.x > confettiCanvas.width + 50) {
                    p.life -= 0.05;
                }
                if (p.y > confettiCanvas.height * 0.7) {
                    p.life -= 0.005;
                }
                p.opacity = Math.max(0, p.life);

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = p.color;

                if (p.shape === 'rect') {
                    ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
                } else if (p.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, p.size / 3, 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.shape === 'triangle') {
                    ctx.beginPath();
                    ctx.moveTo(0, -p.size / 2);
                    ctx.lineTo(-p.size / 2, p.size / 2);
                    ctx.lineTo(p.size / 2, p.size / 2);
                    ctx.closePath();
                    ctx.fill();
                } else if (p.shape === 'streamer') {
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, -p.size);
                    ctx.quadraticCurveTo(p.size / 2, 0, 0, p.size);
                    ctx.stroke();
                }

                ctx.restore();
            });

            // Remove dead pieces
            confettiPieces = confettiPieces.filter(p => p.opacity > 0);

            if (confettiPieces.length > 0) {
                requestAnimationFrame(animateConfetti);
            } else {
                ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                confettiActive = false;
            }
        }

        // Click interaction on the table cat
        let partyStarted = false;
        const tableCat = document.getElementById('table-cat');
        const messageBubble = document.getElementById('message');
        const flames = document.getElementById('flames');
        const candleGlow = document.getElementById('candle-glow');
        const catMouth = document.getElementById('cat-mouth');

        tableCat.addEventListener('click', () => {
            if (partyStarted) return;
            partyStarted = true;

            // Launch confetti from corners
            launchConfetti();

            // Show message bubble
            messageBubble.classList.add('show');

            // Light the cake on fire
            flames.classList.add('lit');
            candleGlow.style.opacity = '0';

            // Make the main cat smile big
            catMouth.setAttribute('d', 'M340,188 Q346,196 352,188');
            catMouth.setAttribute('stroke-width', '2');

            // Make all floating cats happy (bigger smiles)
            document.querySelectorAll('.cat-smile').forEach(mouth => {
                const d = mouth.getAttribute('d');
                // Parse and make the smile wider
                mouth.setAttribute('d', d.replace(/Q(\d+),(\d+)/, (m, x, y) => `Q${x},${parseInt(y) + 4}`));
                mouth.setAttribute('stroke-width', '1.5');
            });

            // Add bouncy animation to floating cats
            document.querySelectorAll('.floating-cat').forEach(cat => {
                cat.style.animationDuration = '3s';
            });

            // Spawn extra confetti/hearts burst
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.textContent = Math.random() > 0.5 ? '♥' : '✦';
                    heart.style.left = (30 + Math.random() * 40) + '%';
                    heart.style.top = (40 + Math.random() * 20) + '%';
                    heart.style.color = heartColors[Math.floor(Math.random() * heartColors.length)];
                    heart.style.fontSize = (12 + Math.random() * 18) + 'px';
                    heart.style.animationDuration = (4 + Math.random() * 6) + 's';
                    heart.style.animationDelay = '0s';
                    heartsContainer.appendChild(heart);
                }, i * 100);
            }
        });
    </script>
